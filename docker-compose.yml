# ============================================================
# eCabinet — Triển khai full-stack (GIAI ĐOẠN 2)
#   web : frontend build sẵn, phục vụ qua nginx + proxy /api
#   api : backend Node.js (JWT, phân quyền, REST)
#   db  : PostgreSQL 16 + volume dữ liệu
#
# Chạy:      docker compose up -d --build
# Truy cập:  http://localhost:8080   (đăng nhập: chutich / 123456)
# Đổi bí mật khi triển khai thật:
#   DB_PASSWORD=... JWT_SECRET=... docker compose up -d --build
# ============================================================
services:
  web:
    build:
      context: .
      args:
        VITE_API_URL: /api        # frontend gọi API cùng origin qua nginx
    container_name: ecabinet-web
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    build: ./server
    container_name: ecabinet-api
    environment:
      PORT: 3000
      DATABASE_URL: postgres://ecabinet:${DB_PASSWORD:-ecabinet}@db:5432/ecabinet
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_TTL: ${JWT_TTL:-3600}
      REFRESH_TTL_SEC: ${REFRESH_TTL_SEC:-604800}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
      LOGIN_RATE_MAX: ${LOGIN_RATE_MAX:-10}
      # Họp trực tuyến WebRTC (LiveKit) — GATED: trống -> mô phỏng; điền -> họp thật.
      # Khuyến nghị LiveKit Cloud cho nhanh (xem README). Backend chỉ mint token.
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      # ---- Object storage tách tệp base64 khỏi DB (GĐ3) — GATED ----
      # Trống -> giữ base64 trong cột JSONB như cũ (tương thích ngược, demo/dev không đổi).
      # Điền đủ -> tệp MỚI được tách sang MinIO/S3, DB chỉ lưu storageKey (chống phình DB).
      # Với MinIO nội bộ dùng đúng 5 dòng dưới (đã trỏ tới service `minio` bên dưới).
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # expose để debug trực tiếp API (tùy chọn):
    # ports: ["3000:3000"]

  db:
    image: postgres:16-alpine
    container_name: ecabinet-db
    environment:
      POSTGRES_DB: ecabinet
      POSTGRES_USER: ecabinet
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecabinet}
    volumes:
      - ecabinet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecabinet -d ecabinet"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # ---------- OBJECT STORAGE GIAI ĐOẠN 3 — MinIO (S3-compatible) ----------
  # Cụm "Server-File" của HSMT: lưu tệp đính kèm dung lượng lớn TÁCH khỏi DB.
  # Kích hoạt luồng tách file: đặt các biến S3_* cho service `api` ở trên (xem README).
  # Ví dụ bật MinIO nội bộ (thêm vào file .env cạnh docker-compose.yml):
  #   S3_ENDPOINT=http://minio:9000
  #   S3_BUCKET=ecabinet-docs
  #   S3_ACCESS_KEY=ecabinet         (= MINIO_USER)
  #   S3_SECRET_KEY=ecabinet-secret  (= MINIO_PASSWORD)
  #   S3_FORCE_PATH_STYLE=true
  minio:
    image: minio/minio:latest
    container_name: ecabinet-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-ecabinet}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-ecabinet-secret}
      # ĐỢT 3 — CORS cho hop TRÌNH DUYỆT→MinIO: đường XEM tài liệu trên FE fetch endpoint
      # /api/documents/:id/download (có Authorization) rồi TỰ THEO 302 sang presigned URL của
      # MinIO. Hop trình duyệt→MinIO là cross-origin -> MinIO PHẢI trả CORS (Access-Control-Allow-Origin)
      # thì fetch mới đọc được Blob. Mặc định '*' cho dễ dựng; VẬN HÀNH nên đặt = origin THẬT của
      # web (vd https://ecabinet.gov.vn) qua biến MINIO_CORS_ORIGIN. Nếu KHÔNG mở CORS, FE tự
      # fallback gọi lại /download?mode=stream (same-origin, backend stream bytes) — vẫn xem được.
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ORIGIN:-*}
    volumes:
      - ecabinet_minio:/data
    # Console quản trị 9001 (tùy chọn xem tệp trong bucket); API S3 nội bộ 9000.
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # Tạo bucket khởi tạo 1 lần (idempotent) rồi thoát. Bucket PRIVATE (không public):
  # nội dung tệp chỉ truy cập qua backend đã kiểm quyền — KHÔNG mở đọc ẩn danh.
  minio-init:
    image: minio/mc:latest
    container_name: ecabinet-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER:-ecabinet} ${MINIO_PASSWORD:-ecabinet-secret} &&
      mc mb --ignore-existing local/${S3_BUCKET:-ecabinet-docs} &&
      echo 'Bucket ${S3_BUCKET:-ecabinet-docs} sẵn sàng (private).'
      "
    restart: "no"

volumes:
  ecabinet_pgdata:
  ecabinet_minio:
