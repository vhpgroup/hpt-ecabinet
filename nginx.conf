server {
    listen 80;
    listen [::]:80;   # IPv6-ready: dual-stack — chấp nhận kết nối cả IPv4 và IPv6
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # Tài liệu tải lên dạng base64 trong JSON — nới giới hạn body
    client_max_body_size 25m;

    # Realtime WebSocket (GĐ3) — cần header nâng cấp kết nối.
    # SCALE NGANG: đây là nginx nội bộ của service `web` (1 upstream `api`). Khi chạy App×2
    # sau CÂN BẰNG TẢI ngoài (mô hình HSMT), bật Redis backplane (REDIS_URL) -> realtime đồng
    # bộ toàn cụm nên LB ngoài KHÔNG bắt buộc sticky session. Nếu KHÔNG bật Redis, LB ngoài
    # cần sticky (ip_hash/cookie) để client giữ đúng 1 instance (xem docs A3.2 + ho-so/12).
    location /api/realtime {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API backend (GĐ2)
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://api:3000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(svg|png|webmanifest|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
