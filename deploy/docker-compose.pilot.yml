# ============================================================
# eCabinet — TRIỂN KHAI PILOT (mức 1): HTTPS tự động + full-stack
#   caddy : reverse proxy, TLS tự động (Let's Encrypt hoặc tự ký)
#   web   : frontend (nginx) build với VITE_API_URL=/api, proxy /api -> api
#   api   : backend Node (JWT, ACL, realtime)
#   db    : PostgreSQL 16 + volume + healthcheck
#
# Chạy 1 lệnh:  ./deploy/pilot.sh
# Thủ công:     cd deploy && docker compose -f docker-compose.pilot.yml --env-file .env up -d --build
# Context build trỏ lên thư mục gốc dự án (..) vì file này nằm trong deploy/.
# ============================================================
name: ecabinet

services:
  caddy:
    image: caddy:2-alpine
    container_name: ecabinet-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?Chưa đặt DOMAIN trong deploy/.env}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ${CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # lưu chứng chỉ TLS (quan trọng — đừng xóa)
      - caddy_config:/config
    depends_on:
      - web

  web:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ecabinet-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    # không mở cổng ra host: chỉ Caddy tiếp xúc bên ngoài

  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: ecabinet-api
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgres://ecabinet:${DB_PASSWORD:?Chưa đặt DB_PASSWORD}@db:5432/ecabinet
      JWT_SECRET: ${JWT_SECRET:?Chưa đặt JWT_SECRET}
      JWT_TTL: ${JWT_TTL:-3600}
      REFRESH_TTL_SEC: ${REFRESH_TTL_SEC:-604800}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
      LOGIN_RATE_MAX: ${LOGIN_RATE_MAX:-10}
      CORS_ORIGIN: https://${DOMAIN}
      # --- Họp trực tuyến WebRTC (LiveKit) — GATED: bỏ trống 3 biến này -> app
      #     tự dùng giao diện mô phỏng. Điền để bật họp thật. ---
      #   LIVEKIT_URL: URL WebSocket client kết nối tới LiveKit (wss://…/ hoặc ws://…)
      #   LIVEKIT_API_KEY / LIVEKIT_API_SECRET: cặp khóa để server MINT access token.
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: ecabinet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecabinet
      POSTGRES_USER: ecabinet
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Chưa đặt DB_PASSWORD}
    volumes:
      - ecabinet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecabinet -d ecabinet"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ============================================================
  # LIVEKIT — MÁY CHỦ MEDIA WebRTC (SFU) cho họp trực tuyến thật.
  #
  # MẶC ĐỊNH TẮT (comment) vì media server có yêu cầu HẠ TẦNG riêng, KHÁC
  # hẳn HTTP thường và KHÔNG proxy trọn vẹn qua Caddy như /api được:
  #   • Cổng signaling 7880 (WS/HTTP) + TURN/TLS 7881 (TCP).
  #   • DẢI CỔNG UDP lớn cho luồng media (mặc định 50000-60000/udp) —
  #     PHẢI mở trên firewall/NAT, không thể giấu sau reverse proxy.
  #   • Cần WSS (TLS) để trình duyệt kết nối: hoặc đặt LiveKit sau TLS của
  #     riêng nó (khuyến nghị domain/subdomain riêng, vd rtc.<domain>), hoặc
  #     dùng chứng chỉ do LiveKit tự quản.
  #   • Khi client và server khác NAT -> cần TURN (LiveKit có TURN tích hợp).
  #
  # >>> KHUYẾN NGHỊ CHO PILOT: DÙNG **LiveKit Cloud** (miễn phí mức dùng thử)
  #     để khỏi lo cổng UDP/TURN/TLS. Chỉ cần đặt trong deploy/.env:
  #       LIVEKIT_URL=wss://<project>.livekit.cloud
  #       LIVEKIT_API_KEY=<key>
  #       LIVEKIT_API_SECRET=<secret>
  #     (Backend api chỉ MINT token; không cần chạy service này.)
  #
  # >>> TỰ HOST: bỏ comment khối dưới, tạo deploy/livekit.yaml (mẫu ở README),
  #     mở cổng, trỏ rtc.<domain> tới máy chủ, rồi đặt:
  #       LIVEKIT_URL=wss://rtc.<domain>
  #     Dùng host networking để LiveKit nắm dải UDP hiệu quả nhất.
  #
  #   livekit:
  #     image: livekit/livekit-server:latest
  #     container_name: ecabinet-livekit
  #     restart: unless-stopped
  #     command: ["--config", "/etc/livekit.yaml"]
  #     network_mode: host          # cần cho dải cổng UDP media
  #     environment:
  #       LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
  #     volumes:
  #       - ./livekit.yaml:/etc/livekit.yaml:ro
  #     # Nếu KHÔNG dùng host networking, thay bằng ports (kém tối ưu media):
  #     # ports:
  #     #   - "7880:7880"                 # signaling WS/HTTP
  #     #   - "7881:7881"                 # TURN/TLS (TCP)
  #     #   - "50000-60000:50000-60000/udp"  # luồng media RTP/RTCP

volumes:
  ecabinet_pgdata:
  caddy_data:
  caddy_config:
